services:
  postgres:
    image: 'postgres:17'
    container_name: sismer-postgres
    environment:
      - 'POSTGRES_DB=orders_db'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kafka:
    image: 'apache/kafka:4.2.0'
    container_name: sismer-kafka
    ports:
      - '9092:9092'

volumes:
  postgres-data: